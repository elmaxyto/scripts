name: Aggiorna m3u

on:
  schedule:
    - cron: '0 1 * * *' # ogni giorno all'1:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Pull & rebase prima delle modifiche
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui Health Check
        run: python iptv_health_check.py

      - name: Commit & push Status Report
        run: |
          git add STATUS.md
          if git diff --staged --quiet; then
            echo "Nessuna modifica nel report."
          else
            git commit -m "Daily IPTV Health Check [skip ci]"
            git push origin HEAD:main
          fi
